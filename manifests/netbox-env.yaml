# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: netbox-env
  namespace: netbox
type: Opaque
stringData:
  # --- Database ---
  DB_HOST: "netbox-postgres"
  DB_NAME: "netbox"
  DB_USER: "netbox"
  DB_PASSWORD: "NxE1bHnplEANALJ9Vao3ndK4aH7i56Z0vCG7PZbTzqI"

  # --- Redis (Session Store) ---
  REDIS_HOST: "netbox-redis"
  REDIS_PASSWORD: "i_5rvZBxxiC74tXu5r9HEaklBwJSNJtM1M1cJoVFXpo"

  # --- Redis (Cache) ---
  REDIS_CACHE_HOST: "netbox-redis-cache"
  REDIS_CACHE_PASSWORD: "tYzz3tOjm_UmZ6Y-MsMKcf02nEDykQimQ9KLlI9AJbk"

  # --- Security ---
  # Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(64))"
  SECRET_KEY: "ab-ABA3pHOMesAA5Zpx5eKf3WT-EV34Y2Phj8qP9H4SFJKZk6WnT01242fqLfkYScWU2TQylazECb6bRSfUMXg"

