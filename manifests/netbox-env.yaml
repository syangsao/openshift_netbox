# ==============================================================================
# NetBox Environment Variables
# ==============================================================================
# IMPORTANT: Replace all placeholder values before deploying!
# Generate a strong SECRET_KEY: python3 -c "import secrets; print(secrets.token_urlsafe(64))"
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: netbox-env
  namespace: netbox
type: Opaque
stringData:
  # --- Database ---
  DB_HOST: "netbox-postgres"
  DB_NAME: "netbox"
  DB_USER: "netbox"
  DB_PASSWORD: "CHANGE-ME-db-strong-password"

  # --- Redis (Session Store) ---
  REDIS_HOST: "netbox-redis"
  REDIS_PASSWORD: "CHANGE-ME-redis-session-password"

  # --- Redis (Cache) ---
  REDIS_CACHE_HOST: "netbox-redis-cache"
  REDIS_CACHE_PASSWORD: "CHANGE-ME-redis-cache-password"

  # --- Security ---
  # Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(64))"
  SECRET_KEY: "REPLACE_WITH_64_CHAR_RANDOM_STRING_BEFORE_DEPLOYING"

  # --- Superuser (auto-created on first boot) ---
  # Set to "true" to skip creating a superuser (e.g., if using SSO)
  SKIP_SUPERUSER: "false"
  SUPERUSER_NAME: "admin"
  SUPERUSER_PASSWORD: "CHANGE-ME-admin-password"
  SUPERUSER_EMAIL: "admin@example.com"

  # --- Granian (ASGI server) ---
  GRANIAN_WORKERS: "4"
  GRANIAN_BACKPRESSURE: "4"

  # --- CORS (optional) ---
  CORS_ORIGIN_ALLOW_ALL: "True"

  # --- Email (optional - uncomment to enable) ---
  # EMAIL_SERVER: "smtp.example.com"
  # EMAIL_PORT: "587"
  # EMAIL_USERNAME: "netbox"
  # EMAIL_PASSWORD: ""
  # EMAIL_USE_SSL: "false"
  # EMAIL_USE_TLS: "true"
  # EMAIL_FROM: "netbox@example.com"
