---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: netbox-postgres
  namespace: netbox
  labels:
    app: netbox-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: netbox-postgres

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbox-postgres
  namespace: netbox
  labels:
    app: netbox-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: netbox-postgres
  template:
    metadata:
      labels:
        app: netbox-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: netbox-env
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: netbox-env
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: netbox-env
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netbox-env
                  key: DB_PASSWORD
          volumeMounts:
            - name: run-tmp
              mountPath: /run
            - name: postgres-data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -q
                - -d
                - netbox
                - -U
                - netbox
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: run-tmp
          emptyDir: {}
        - name: postgres-data
          persistentVolumeClaim:
            claimName: netbox-postgres-pvc

---
# PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: netbox-postgres-pvc
  namespace: netbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # CHANGE: Set your storage class (e.g., nfs-csidriver3, gp3, etc.)
  # storageClassName: nfs-csidriver3
