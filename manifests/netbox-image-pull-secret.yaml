---
# Image Pull Secret for private container registry
# IMPORTANT: Replace the placeholder below with your actual registry credentials.
#
# Generate with:
#   oc create secret docker-registry netbox-image-pull-secret \
#     --docker-server=YOUR_REGISTRY \
#     --docker-username=YOUR_USERNAME \
#     --docker-password=YOUR_PASSWORD \
#     --docker-email=you@example.com \
#     -n netbox \
#     --dry-run=client -o yaml | oc apply -f -
#
# Or edit this file: encode your config with:
#   echo '{"auths":{"YOUR_REGISTRY":{"auth":"$(echo -n USER:PASS | base64)","email":""}}}' | base64
apiVersion: v1
kind: Secret
metadata:
  name: netbox-image-pull-secret
  namespace: netbox
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6IHsiWU9VUl9SRUdJU1RSWSI6IHsiYXV0aCI6ICJQTEFDRUhPTERFUl9CQVNFNjRfQVVUSCIsICJlbWFpbCI6ICIifX19
